<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Spotter</title>
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Live%20Spotter%22%2C%22short_name%22%3A%22Spotter%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231e1e2f%22%2C%22theme_color%22%3A%22%234ecdc4%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ctext%20y%3D'80'%20font-size%3D'80'%3E%F0%9F%9B%A9%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    <style>
        body { font-family: system-ui, sans-serif; background: #1e1e2f; color: #eee; padding: 20px; margin: 0; }
        .card { background: #2a2a40; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        button { background: #ff6b6b; color: white; border: none; padding: 15px; border-radius: 15px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .aircraft { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #3a3a5a; }
        .aircraft:last-child { border-bottom: none; }
        .callsign { font-weight: bold; color: #4ecdc4; }
        .distance { font-size: 14px; color: #ffe66d; }
        .note { font-size: 13px; color: #aaa; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📍 Твоя позиция</h2>
        <div id="user-coords">Ожидание GPS...</div>
    </div>
    <div class="card">
        <h2>🛩 Самолёты рядом</h2>
        <div id="aircraft-container">Загрузка...</div>
        <p class="note" id="zone-info">Зона видимости: 15 км, высота < 6000 м<br>Обновление каждые 5 мин</p>
    </div>
    <button onclick="requestNotificationPermission()">🔔 Включить уведомления</button>
    <script>
        const VISIBLE_RADIUS_KM = 15;
        const MAX_ALTITUDE_M = 6000;
        let userLat = null, userLng = null;
        let notifiedAircraft = new Set();

        // ТОЛЬКО РАБОЧИЕ ПРОКСИ (проверены в РФ)
        const PROXY_LIST = [
            'https://cors.bridged.cc/',                // лучший
            'https://cors.eu.org/'                     // запасной
        ];

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW ok'))
                    .catch(err => console.log('SW err'));
            });
        }

        function getUserLocation() {
            if (!navigator.geolocation) {
                document.getElementById('user-coords').textContent = 'GPS не поддерживается';
                return;
            }
            navigator.geolocation.getCurrentPosition(
                pos => {
                    userLat = pos.coords.latitude;
                    userLng = pos.coords.longitude;
                    document.getElementById('user-coords').innerHTML = `📍 ${userLat.toFixed(4)}°, ${userLng.toFixed(4)}°`;
                    fetchAircraft();
                },
                err => { document.getElementById('user-coords').textContent = 'Ошибка GPS: ' + err.message; },
                { enableHighAccuracy: true }
            );
        }

        async function fetchAircraft() {
            if (userLat === null) return;
            const container = document.getElementById('aircraft-container');
            container.innerHTML = 'Поиск самолётов...';

            const latMin = userLat - 1, latMax = userLat + 1;
            const lngMin = userLng - 1, lngMax = userLng + 1;
            const openskyUrl = `https://opensky-network.org/api/states/all?lamin=${latMin}&lomin=${lngMin}&lamax=${latMax}&lomax=${lngMax}`;

            let data = null;
            // Прямой запрос не делаем — бесполезно. Сразу лупим через прокси.
            for (const proxy of PROXY_LIST) {
                try {
                    const url = proxy + openskyUrl;
                    const res = await fetch(url);
                    data = await res.json();
                    if (data && data.states) break;
                } catch (e) {
                    console.warn('Прокси не сработал:', proxy);
                }
            }

            if (!data || !data.states) {
                container.innerHTML = '❌ Все прокси недоступны. Попробуй позже.';
                return;
            }
            if (data.states.length === 0) {
                container.innerHTML = 'Самолётов поблизости нет.';
                return;
            }

            const nearby = [];
            for (const state of data.states) {
                const [icao24, callsign, , , , lon, lat, baro_altitude] = state;
                if (lat == null || lon == null || baro_altitude == null) continue;
                const distKm = getDistanceFromLatLonInKm(userLat, userLng, lat, lon);
                if (distKm <= VISIBLE_RADIUS_KM && baro_altitude <= MAX_ALTITUDE_M) {
                    nearby.push({
                        icao: icao24,
                        callsign: callsign ? callsign.trim() : 'N/A',
                        altitude: baro_altitude.toFixed(0),
                        distance: distKm.toFixed(1)
                    });
                }
            }

            nearby.sort((a, b) => a.distance - b.distance);
            container.innerHTML = nearby.length === 0
                ? 'Все самолёты далеко или высоко.'
                : nearby.map(a => `
                    <div class="aircraft">
                        <div><span class="callsign">${a.callsign}</span><br><small>${a.altitude} м</small></div>
                        <div class="distance">${a.distance} км</div>
                    </div>`).join('');

            checkAndNotify(nearby);
        }

        function checkAndNotify(aircraftList) {
            if (Notification.permission !== 'granted') return;
            for (const ac of aircraftList) {
                if (notifiedAircraft.has(ac.icao)) continue;
                notifiedAircraft.add(ac.icao);
                if (navigator.serviceWorker) {
                    navigator.serviceWorker.ready.then(sw => {
                        sw.showNotification(`🛩 ${ac.callsign} рядом!`, {
                            body: `Высота ${ac.altitude} м, расстояние ${ac.distance} км`,
                            icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="80" font-size="80">🛩</text></svg>',
                            vibrate: [200, 100, 200]
                        });
                    });
                }
            }
        }

        function requestNotificationPermission() {
            Notification.requestPermission().then(perm => {
                alert(perm === 'granted' ? 'Уведомления включены!' : 'Разреши уведомления в настройках браузера.');
            });
        }

        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = deg2rad(lat2 - lat1), dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat/2)**2 + Math.cos(deg2rad(lat1))*Math.cos(deg2rad(lat2))*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        function deg2rad(deg) { return deg * (Math.PI/180); }

        getUserLocation();
        setInterval(fetchAircraft, 300000);
    </script>
</body>
</html>
